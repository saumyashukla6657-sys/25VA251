<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Largest Number Finder</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #74ebd5, #9face6);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container{
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        text-align: center;
        width: 350px;
    }

    h2{
        color: #333;
        margin-bottom: 20px;
    }

    input{
        width: 90%;
        padding: 10px;
        margin: 8px 0;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
    }

    button{
        background: #4CAF50;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
    }

    button:hover{
        background: #45a049;
    }

    #result{
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
        color: #2196F3;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Largest Number Finder</h2>

    <input type="number" id="num1" placeholder="Enter Number 1">
    <input type="number" id="num2" placeholder="Enter Number 2">
    <input type="number" id="num3" placeholder="Enter Number 3">
    <input type="number" id="num4" placeholder="Enter Number 4">
    <input type="number" id="num5" placeholder="Enter Number 5">

    <br>
    <button onclick="findLargest()">Find Largest</button>

    <div id="result"></div>
</div>

<script>
function findLargest() {
    let n1 = Number(document.getElementById("num1").value);
    let n2 = Number(document.getElementById("num2").value);
    let n3 = Number(document.getElementById("num3").value);
    let n4 = Number(document.getElementById("num4").value);
    let n5 = Number(document.getElementById("num5").value);

    if (
        document.getElementById("num1").value === "" ||
        document.getElementById("num2").value === "" ||
        document.getElementById("num3").value === "" ||
        document.getElementById("num4").value === "" ||
        document.getElementById("num5").value === ""
    ) {
        document.getElementById("result").innerHTML =
            "Please enter all 5 numbers!";
        return;
    }

    let largest = Math.max(n1, n2, n3, n4, n5);

    document.getElementById("result").innerHTML =
        "Largest Number = " + largest;
}
</script>

</body>
</html>
