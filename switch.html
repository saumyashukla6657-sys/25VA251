<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let day=3;
        switch(day){
    
    
            case 1: document.write("Today is Monday");
            break;
            case 2: document.write("Today is Tuesday");
            break;
            case 3: document.write("Day after tomorrow is Wednesday");
            break;
            default: document.write("Invalid day");
            break;
        }
    </script>
</body>
</html>
